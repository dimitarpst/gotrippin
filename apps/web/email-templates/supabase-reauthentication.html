<!--
  Supabase → Authentication → Emails → Reauthentication → Body (Source)
  Suggested subject: Your gotrippin verification code

  Variables: {{ .Token }}, {{ .Email }}
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Reauthentication</title>
</head>
<body style="margin:0;padding:0;background-color:#ececf0;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#ececf0;">
    <tr>
      <td align="center" style="padding:20px 12px;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:440px;background-color:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 14px rgba(23,19,26,0.07);">
          <tr>
            <td style="padding:18px 24px 16px;text-align:center;background-color:#17131a;">
              <img src="https://gotrippin.app/logo_gotrippin.png" width="132" height="34" alt="gotrippin" style="display:block;margin:0 auto;border:0;outline:none;text-decoration:none;width:132px;max-width:132px;height:auto;" />
            </td>
          </tr>
          <tr>
            <td style="padding:24px 24px 28px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;font-size:16px;line-height:1.5;color:#17131a;">
              <h1 style="margin:0 0 10px;font-size:20px;font-weight:700;letter-spacing:-0.02em;color:#17131a;">Confirm it is you</h1>
              <p style="margin:0 0 20px;color:#52525b;font-size:15px;line-height:1.55;">Enter this code to continue with a sensitive action on your account. Do not share it with anyone.</p>
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="margin:0 0 22px;">
                <tr>
                  <td align="center" style="padding:18px 20px;background-color:#fafafa;border-radius:10px;border:1px dashed #d4d4d8;">
                    <p style="margin:0 0 6px;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#71717a;">Your code</p>
                    <p style="margin:0;font-family:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace;font-size:26px;font-weight:700;letter-spacing:0.18em;color:#17131a;">{{ .Token }}</p>
                  </td>
                </tr>
              </table>
              <p style="margin:0;font-size:12px;color:#71717a;line-height:1.5;">This code expires soon. If you did not start this, secure your account and change your password.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 24px 20px;background-color:#fafafa;border-top:1px solid #ececf0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:11px;line-height:1.5;color:#71717a;text-align:center;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" align="center" style="margin:0 auto;">
                <tr>
                  <td style="padding:0 8px 0 0;vertical-align:middle;">
                    <img src="https://gotrippin.app/logo_gotrippin_sm.png" width="22" height="22" alt="" style="display:block;border:0;width:22px;height:auto;" />
                  </td>
                  <td style="vertical-align:middle;font-size:12px;color:#71717a;">Verification</td>
                </tr>
              </table>
              <p style="margin:10px 0 0;font-size:11px;color:#a1a1aa;line-height:1.45;word-break:break-all;">{{ .Email }}</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
